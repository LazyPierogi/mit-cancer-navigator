version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: navigator-postgres
    environment:
      POSTGRES_DB: navigator
      POSTGRES_USER: navigator
      POSTGRES_PASSWORD: navigator
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: navigator-redis
    ports:
      - "6379:6379"

volumes:
  postgres-data:

